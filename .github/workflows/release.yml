name: Create Release

on:
  push:
    tags:
      - 'v*' # Se activa con tags como v1.0, v1.0.1, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesita permisos para crear releases
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package plugin for release
        id: package
        run: |
          # El nombre del directorio del plugin que irá dentro del zip
          PLUGIN_DIR="dynamic_panelzoom.koplugin"
          
          # Creamos una estructura temporal para empaquetar
          mkdir -p "package/${PLUGIN_DIR}"
          
          # Copiamos todos los archivos del repositorio a esa estructura
          # Usamos 'git ls-files' para asegurarnos de copiar solo los archivos versionados
          git ls-files | xargs -I {} cp --parents {} "package/"
          
          # Movemos el contenido al directorio final
          mv package/dynamic_panelzoom.koplugin/* "package/${PLUGIN_DIR}/"
          rm -rf package/dynamic_panelzoom.koplugin
          mv package/* package/${PLUGIN_DIR}/

          # Creamos el archivo zip
          cd package
          ZIP_NAME="${PLUGIN_DIR}.zip"
          zip -r "../${ZIP_NAME}" "${PLUGIN_DIR}"
          cd ..

          # Guardamos el nombre del zip para el siguiente paso
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip_name }}
